name: ks_short
dataset:
  _target_: src.datasets.ks.ks.KSDataset
  path: ${data.data_folder}/KS_valid.h5
  split: valid
  nt: 140
  nx: 256
  n_input_times: 1
  n_output_times: 20
  min_time_step: 0
  max_time_step: 1e6

num_workers: ${data.num_workers}
pin_memory: ${data.pin_memory}
batch_size_per_device: ${data.batch_size_per_device}
enable_device_seed: ${data.train_enable_device_seed}
base_seed: ${data.train_base_seed}
